{% extends "base.html" %}
{% block title %}Jobs{% endblock %}

{% block content %}
<div class="page-head">
  <h1>Jobs</h1>
  <p class="muted">Filter, review, and triage stored roles. Filters apply live.</p>
</div>

<form class="filters" hx-get="{{ url_for('jobs_fragment') }}" hx-target="#job-results"
      hx-trigger="change, submit, keyup delay:300ms from:input[name='q']"
      hx-push-url="false" hx-indicator="#filter-spin">
  <div class="field">
    <label>Search</label>
    <input type="search" name="q" value="{{ filters.q }}" placeholder="title or company" />
  </div>
  <div class="field">
    <label>Min score</label>
    <input type="number" name="min_score" value="{{ filters.min_score }}" min="0" max="100" step="5" />
  </div>
  <div class="field">
    <label>Remote</label>
    <select name="remote">
      <option value="">Any</option>
      {% for c in remote_categories %}
      <option value="{{ c }}" {{ 'selected' if filters.remote == c }}>{{ remote_label(c) }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label>Status</label>
    <select name="status">
      <option value="">Any</option>
      {% for s in statuses %}
      <option value="{{ s }}" {{ 'selected' if filters.status == s }}>{{ status_label(s) }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label>Source</label>
    <select name="source">
      <option value="">Any</option>
      {% for s in sources %}
      <option value="{{ s }}" {{ 'selected' if filters.source == s }}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label>Date Posted</label>
    <select name="days_ago">
      <option value="">Any Time</option>
      <option value="1" {{ 'selected' if filters.days_ago == '1' }}>Past 24 hours</option>
      <option value="7" {{ 'selected' if filters.days_ago == '7' }}>Past 7 days</option>
      <option value="30" {{ 'selected' if filters.days_ago == '30' }}>Past 30 days</option>
    </select>
  </div>
  <div class="field">
    <label>Sort By</label>
    <select name="sort_by">
      <option value="score" {{ 'selected' if filters.sort_by == 'score' }}>Highest Score</option>
      <option value="date" {{ 'selected' if filters.sort_by == 'date' }}>Newest found first</option>
    </select>
  </div>
  <div style="display: flex; align-items: center; gap: 0.5rem;">
    <button type="submit" class="btn btn-ghost">Apply</button>
    <a href="{{ url_for('jobs_page') }}" class="btn btn-ghost" style="text-decoration: none;">Reset</a>
    <span id="filter-spin" class="htmx-indicator spinner" style="margin-left: 10px;">Updating…</span>
  </div>
</form>

<div id="job-results">
  {% include "partials/job_table.html" %}
{% endblock %}
